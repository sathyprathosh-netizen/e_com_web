<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shop - Vogue Vista</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
  body {
    font-family: 'Poppins', sans-serif;
    margin: 0; padding: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    height: 100vh;
    background: #f8fafc;
    color: #0f172a;
    text-align: center;
  }
  .icon {
    font-size: 60px;
    color: #1e40af;
    margin-bottom: 20px;
  }
  h1 {
    font-size: 36px; margin: 0 0 10px;
  }
  p {
    font-size: 16px; color: #718096;
    margin-bottom: 30px;
  }
  a.btn {
    background: linear-gradient(135deg, #1e40af, #1d4ed8);
    color: #fff;
    text-decoration: none;
    padding: 12px 28px;
    border-radius: 30px;
    font-weight: 600;
    transition: 0.3s;
    box-shadow: 0 4px 15px rgba(30, 64, 175, 0.35);
  }
  a.btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(30, 64, 175, 0.45);
  }
</style>
</head>
<body>
  <i class="fas fa-shopping-bag icon"></i>
  <h1>Vogue Vista Shop</h1>
  <p>Our complete collection will be available here soon.</p>
  <a href="index.html" class="btn"><i class="fas fa-arrow-left"></i> Back to Home</a>
</body>
</html>
